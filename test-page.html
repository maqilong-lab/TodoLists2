<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS • TASK 测试页面</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Tailwind 配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'cyber-dark': '#0a0a0a',
                        'cyber-purple': '#8b5cf6',
                        'cyber-cyan': '#06b6d4',
                        'cyber-pink': '#ec4899',
                        'cyber-red': '#ef4444',
                        'glass': 'rgba(255, 255, 255, 0.1)',
                    },
                    boxShadow: {
                        'neon-purple': '0 0 5px #8b5cf6, 0 0 20px #8b5cf6, 0 0 40px #8b5cf6',
                        'neon-cyan': '0 0 5px #06b6d4, 0 0 20px #06b6d4, 0 0 40px #06b6d4',
                        'neon-pink': '0 0 5px #ec4899, 0 0 20px #ec4899, 0 0 40px #ec4899',
                        'neon-red': '0 0 5px #ef4444, 0 0 20px #ef4444, 0 0 40px #ef4444',
                    }
                }
            }
        }
    </script>

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css">

    <style>
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0b2e 50%, #0a0a0a 100%);
            min-height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        .neon-border-purple {
            border: 1px solid #8b5cf6;
            box-shadow: 0 0 10px rgba(139, 92, 246, 0.5), inset 0 0 10px rgba(139, 92, 246, 0.1);
        }
        .priority-medium {
            border-left: 4px solid #8b5cf6;
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.3);
        }
        .category-work { background: linear-gradient(45deg, #8b5cf6, #a855f7); }
        .category-study { background: linear-gradient(45deg, #06b6d4, #0891b2); }
        .category-life { background: linear-gradient(45deg, #ec4899, #db2777); }
        .category-personal { background: linear-gradient(45deg, #10b981, #059669); }
        .category-other { background: linear-gradient(45deg, #f59e0b, #d97706); }
        .priority-high { background: linear-gradient(45deg, #ef4444, #dc2626); }
        .priority-medium { background: linear-gradient(45deg, #8b5cf6, #7c3aed); }
        .priority-low { background: linear-gradient(45deg, #06b6d4, #0891b2); }
    </style>
</head>
<body class="text-white relative">
    <!-- 背景粒子 -->
    <div class="particle-bg" id="particles"></div>

    <!-- 主容器 -->
    <div class="container mx-auto px-4 py-8 max-w-4xl relative z-10">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-black mb-4 bg-gradient-to-r from-purple-400 via-cyan-400 to-pink-400 bg-clip-text text-transparent">
                NEXUS • TASK 测试页面
            </h1>
            <p class="text-cyan-300 text-lg">调试版本</p>
        </header>

        <!-- 统计仪表盘 -->
        <div class="grid grid-cols-3 gap-4 mb-8">
            <div class="glass rounded-xl p-4 text-center neon-border-purple">
                <div class="text-2xl font-bold text-purple-400 mb-1" id="totalTasks">0</div>
                <div class="text-xs text-gray-300 uppercase tracking-wider">总任务</div>
            </div>
            <div class="glass rounded-xl p-4 text-center">
                <div class="text-2xl font-bold text-cyan-400 mb-1" id="completedTasks">0</div>
                <div class="text-xs text-gray-300 uppercase tracking-wider">已完成</div>
            </div>
            <div class="glass rounded-xl p-4 text-center">
                <div class="text-2xl font-bold text-pink-400 mb-1" id="pendingTasks">0</div>
                <div class="text-xs text-gray-300 uppercase tracking-wider">待完成</div>
            </div>
        </div>

        <!-- 添加任务表单 -->
        <div class="glass rounded-xl p-6 mb-8 neon-border-purple">
            <h2 class="text-xl font-bold mb-4">添加新任务</h2>
            <div class="space-y-4">
                <input type="text" id="taskTitle" placeholder="输入任务标题..."
                       class="w-full bg-black bg-opacity-30 border border-purple-500 rounded-lg px-4 py-3 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-purple-500">
                <input type="text" id="taskDesc" placeholder="任务描述..."
                       class="w-full bg-black bg-opacity-30 border border-cyan-500 rounded-lg px-4 py-3 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-cyan-500">
                <input type="datetime-local" id="taskDueDate"
                       class="w-full bg-black bg-opacity-30 border border-pink-500 rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-pink-500">

                <div class="grid grid-cols-2 gap-4">
                    <select id="taskPriority" class="bg-black bg-opacity-30 border border-purple-500 rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-purple-500">
                        <option value="low">低优先级</option>
                        <option value="medium" selected>中优先级</option>
                        <option value="high">高优先级</option>
                    </select>

                    <select id="taskCategory" class="bg-black bg-opacity-30 border border-cyan-500 rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-cyan-500">
                        <option value="work">工作</option>
                        <option value="study">学习</option>
                        <option value="life">生活</option>
                        <option value="personal">个人</option>
                        <option value="other">其他</option>
                    </select>
                </div>

                <button onclick="addTask()"
                        class="w-full bg-gradient-to-r from-purple-600 to-cyan-600 hover:from-purple-700 hover:to-cyan-700 text-white px-6 py-3 rounded-lg font-semibold uppercase tracking-wider transition-all duration-300">
                    <i class="fas fa-plus mr-2"></i>添加任务
                </button>
            </div>
        </div>

        <!-- 任务列表 -->
        <div class="glass rounded-xl p-6 neon-border-cyan">
            <h2 class="text-xl font-bold mb-4">任务列表</h2>
            <div id="taskList" class="space-y-4 min-h-96">
                <div class="text-center text-gray-400 py-12">
                    <i class="fas fa-robot text-6xl mb-4 text-purple-400"></i>
                    <p class="text-xl">暂无任务</p>
                    <p class="text-sm mt-2">添加您的第一个任务开始管理</p>
                </div>
            </div>
        </div>

        <!-- 调试信息 -->
        <div class="mt-8 glass rounded-xl p-6">
            <h2 class="text-xl font-bold mb-4 text-yellow-400">调试信息</h2>
            <div id="debugInfo" class="text-sm text-gray-300">
                <p>检查浏览器控制台查看详细日志</p>
            </div>
        </div>
    </div>

    <!-- 调试版JavaScript -->
    <script src="debug-app.js"></script>
</body>
</html>
