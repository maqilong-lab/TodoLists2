<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS • TASK - 未来任务管理系统</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Tailwind 配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'cyber-dark': '#0a0a0a',
                        'cyber-purple': '#8b5cf6',
                        'cyber-cyan': '#06b6d4',
                        'cyber-pink': '#ec4899',
                        'cyber-red': '#ef4444',
                        'glass': 'rgba(255, 255, 255, 0.1)',
                    },
                    boxShadow: {
                        'neon-purple': '0 0 5px #8b5cf6, 0 0 20px #8b5cf6, 0 0 40px #8b5cf6',
                        'neon-cyan': '0 0 5px #06b6d4, 0 0 20px #06b6d4, 0 0 40px #06b6d4',
                        'neon-pink': '0 0 5px #ec4899, 0 0 20px #ec4899, 0 0 40px #ec4899',
                        'neon-red': '0 0 5px #ef4444, 0 0 20px #ef4444, 0 0 40px #ef4444',
                    }
                }
            }
        }
    </script>

    <!-- SortableJS for drag and drop -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        * {
            font-family: 'Orbitron', 'Arial', sans-serif;
            letter-spacing: 0.05em;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0b2e 50%, #0a0a0a 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 背景粒子效果 */
        .particle-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: linear-gradient(45deg, #8b5cf6, #06b6d4, #ec4899);
            border-radius: 50%;
            animation: float 20s infinite linear;
            opacity: 0.6;
        }

        @keyframes float {
            0% { transform: translateY(100vh) translateX(0px); }
            100% { transform: translateY(-100px) translateX(100px); }
        }

        /* 玻璃拟态效果 */
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .glass-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-hover:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
            border-color: rgba(139, 92, 246, 0.5);
        }

        /* 霓虹边框效果 */
        .neon-border-purple {
            border: 1px solid #8b5cf6;
            box-shadow: 0 0 10px rgba(139, 92, 246, 0.5), inset 0 0 10px rgba(139, 92, 246, 0.1);
        }

        .neon-border-cyan {
            border: 1px solid #06b6d4;
            box-shadow: 0 0 10px rgba(6, 182, 212, 0.5), inset 0 0 10px rgba(6, 182, 212, 0.1);
        }

        .neon-border-pink {
            border: 1px solid #ec4899;
            box-shadow: 0 0 10px rgba(236, 72, 153, 0.5), inset 0 0 10px rgba(236, 72, 153, 0.1);
        }

        .neon-border-red {
            border: 1px solid #ef4444;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.5), inset 0 0 10px rgba(239, 68, 68, 0.1);
        }

        /* 优先级颜色 */
        .priority-high {
            border-left: 4px solid #ef4444;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.3);
        }

        .priority-medium {
            border-left: 4px solid #8b5cf6;
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.3);
        }

        .priority-low {
            border-left: 4px solid #06b6d4;
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.3);
        }

        /* 分类标签颜色 */
        .category-work { background: linear-gradient(45deg, #8b5cf6, #a855f7); }
        .category-study { background: linear-gradient(45deg, #06b6d4, #0891b2); }
        .category-life { background: linear-gradient(45deg, #ec4899, #db2777); }
        .category-personal { background: linear-gradient(45deg, #10b981, #059669); }
        .category-other { background: linear-gradient(45deg, #f59e0b, #d97706); }

        /* 动画效果 */
        @keyframes pulse-neon {
            0%, 100% { box-shadow: 0 0 5px currentColor; }
            50% { box-shadow: 0 0 20px currentColor, 0 0 40px currentColor; }
        }

        @keyframes pulse-urgent {
            0%, 100% {
                box-shadow: 0 0 10px #ef4444, 0 0 20px #ef4444;
                transform: scale(1);
            }
            50% {
                box-shadow: 0 0 20px #ef4444, 0 0 40px #ef4444, 0 0 60px #ef4444;
                transform: scale(1.05);
            }
        }

        @keyframes countdown-tick {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .pulse-neon {
            animation: pulse-neon 2s infinite;
        }

        .pulse-urgent {
            animation: pulse-urgent 1s infinite;
        }

        .countdown-display {
            animation: countdown-tick 1s infinite;
            font-weight: bold;
            font-size: 0.875rem;
        }

        @keyframes slide-in {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .slide-in {
            animation: slide-in 0.5s ease-out;
        }

        @keyframes scan-line {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .scan-line {
            position: relative;
            overflow: hidden;
        }

        .scan-line::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #8b5cf6, transparent);
            animation: scan-line 2s infinite;
        }

        /* 完成动画 */
        @keyframes complete-task {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes task-success {
            0% {
                transform: scale(1) rotate(0deg);
                box-shadow: 0 0 10px rgba(34, 197, 94, 0.5);
            }
            25% {
                transform: scale(1.1) rotate(2deg);
                box-shadow: 0 0 20px rgba(34, 197, 94, 0.8);
            }
            50% {
                transform: scale(1.05) rotate(-1deg);
                box-shadow: 0 0 15px rgba(34, 197, 94, 0.6);
            }
            100% {
                transform: scale(1) rotate(0deg);
                box-shadow: 0 0 5px rgba(34, 197, 94, 0.3);
            }
        }

        @keyframes scan-complete {
            0% { transform: translateX(-100%); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateX(100%); opacity: 0; }
        }

        @keyframes particle-burst {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(0);
                opacity: 0;
            }
        }

        .task-complete {
            animation: task-success 0.8s ease-out;
        }

        .scan-complete {
            position: relative;
            overflow: hidden;
        }

        .scan-complete::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(34, 197, 94, 0.3), transparent);
            animation: scan-complete 1s ease-out;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .mobile-stack {
                flex-direction: column;
            }

            .mobile-full {
                width: 100%;
            }
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(45deg, #8b5cf6, #06b6d4);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(45deg, #06b6d4, #ec4899);
        }
    </style>
</head>
<body class="text-white relative">
    <!-- 背景粒子 -->
    <div class="particle-bg" id="particles"></div>

    <!-- 主容器 -->
    <div class="container mx-auto px-4 py-8 max-w-6xl relative z-10">
        <!-- 头部 -->
        <header class="text-center mb-8 md:mb-12 slide-in">
            <h1 class="text-3xl md:text-5xl lg:text-7xl font-black mb-2 md:mb-4 bg-gradient-to-r from-purple-400 via-cyan-400 to-pink-400 bg-clip-text text-transparent">
                NEXUS • TASK
            </h1>
            <p class="text-cyan-300 text-sm md:text-lg tracking-wider uppercase">未来任务管理系统</p>
            <div class="w-24 md:w-32 h-1 bg-gradient-to-r from-purple-500 to-cyan-500 mx-auto mt-2 md:mt-4 rounded-full"></div>
        </header>

        <!-- 统计仪表盘 -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="glass glass-hover rounded-xl p-4 text-center neon-border-purple">
                <div class="text-2xl md:text-3xl font-bold text-purple-400 mb-1" id="totalTasks">0</div>
                <div class="text-xs md:text-sm text-gray-300 uppercase tracking-wider">总任务</div>
            </div>
            <div class="glass glass-hover rounded-xl p-4 text-center neon-border-cyan">
                <div class="text-2xl md:text-3xl font-bold text-cyan-400 mb-1" id="completedTasks">0</div>
                <div class="text-xs md:text-sm text-gray-300 uppercase tracking-wider">已完成</div>
            </div>
            <div class="glass glass-hover rounded-xl p-4 text-center neon-border-pink">
                <div class="text-2xl md:text-3xl font-bold text-pink-400 mb-1" id="pendingTasks">0</div>
                <div class="text-xs md:text-sm text-gray-300 uppercase tracking-wider">待完成</div>
            </div>
            <div class="glass glass-hover rounded-xl p-4 text-center neon-border-red">
                <div class="text-2xl md:text-3xl font-bold text-red-400 mb-1" id="overdueTasks">0</div>
                <div class="text-xs md:text-sm text-gray-300 uppercase tracking-wider">已逾期</div>
            </div>
        </div>

        <!-- 控制面板 -->
        <div class="glass rounded-xl p-6 mb-8 neon-border-purple">
            <div class="space-y-4">
                <!-- 添加任务表单 -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                    <input type="text" id="taskTitle" placeholder="输入任务标题..."
                           class="bg-black bg-opacity-30 border border-purple-500 rounded-lg px-4 py-3 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                    <input type="text" id="taskDesc" placeholder="任务描述..."
                           class="bg-black bg-opacity-30 border border-cyan-500 rounded-lg px-4 py-3 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent">
                    <input type="date" id="taskDueDate"
                           class="bg-black bg-opacity-30 border border-pink-500 rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-pink-500 focus:border-transparent">
                </div>

                <!-- 任务属性选择 -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                    <select id="taskPriority" class="bg-black bg-opacity-30 border border-purple-500 rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-purple-500">
                        <option value="low">低优先级</option>
                        <option value="medium" selected>中优先级</option>
                        <option value="high">高优先级</option>
                    </select>

                    <select id="taskCategory" class="bg-black bg-opacity-30 border border-cyan-500 rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-cyan-500">
                        <option value="work">工作</option>
                        <option value="study">学习</option>
                        <option value="life">生活</option>
                        <option value="personal">个人</option>
                        <option value="other">其他</option>
                    </select>

                    <button onclick="addTask()"
                            class="bg-gradient-to-r from-purple-600 to-cyan-600 hover:from-purple-700 hover:to-cyan-700 text-white px-6 py-3 rounded-lg font-semibold uppercase tracking-wider transition-all duration-300 transform hover:scale-105 hover:shadow-neon-purple">
                        <i class="fas fa-plus mr-2"></i>添加任务
                    </button>
                </div>
            </div>
        </div>

        <!-- 筛选和搜索 -->
        <div class="glass rounded-xl p-6 mb-8 neon-border-cyan">
            <div class="space-y-4">
                <!-- 搜索框 -->
                <div class="relative">
                    <input type="text" id="searchInput" placeholder="搜索任务..."
                           class="w-full bg-black bg-opacity-30 border border-cyan-500 rounded-lg px-4 py-3 pl-12 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent">
                    <i class="fas fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-cyan-400"></i>
                </div>

                <!-- 筛选和操作按钮 -->
                <div class="flex flex-col md:flex-row gap-3">
                    <!-- 筛选按钮 -->
                    <div class="flex flex-wrap gap-2 flex-1">
                        <button onclick="filterTasks('all')" class="filter-btn active px-3 py-2 rounded-lg bg-purple-600 text-white text-xs md:text-sm uppercase tracking-wider">全部</button>
                        <button onclick="filterTasks('pending')" class="filter-btn px-3 py-2 rounded-lg bg-gray-600 text-white text-xs md:text-sm uppercase tracking-wider hover:bg-pink-600 transition-colors">待完成</button>
                        <button onclick="filterTasks('completed')" class="filter-btn px-3 py-2 rounded-lg bg-gray-600 text-white text-xs md:text-sm uppercase tracking-wider hover:bg-cyan-600 transition-colors">已完成</button>
                        <button onclick="filterTasks('high')" class="filter-btn px-3 py-2 rounded-lg bg-gray-600 text-white text-xs md:text-sm uppercase tracking-wider hover:bg-red-600 transition-colors">高优先级</button>
                        <button onclick="filterTasks('overdue')" class="filter-btn px-3 py-2 rounded-lg bg-gray-600 text-white text-xs md:text-sm uppercase tracking-wider hover:bg-red-600 transition-colors">已逾期</button>
                    </div>

                    <!-- 操作按钮 -->
                    <div class="flex gap-2 md:flex-shrink-0">
                        <button onclick="clearCompleted()"
                                class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg text-xs md:text-sm uppercase tracking-wider transition-all duration-300 hover:shadow-neon-red whitespace-nowrap">
                            <i class="fas fa-trash mr-2"></i>清空已完成
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 任务列表 -->
        <div class="glass rounded-xl p-4 md:p-6 neon-border-pink">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-3 mb-4 md:mb-6">
                <h2 class="text-xl md:text-2xl font-bold text-pink-400 uppercase tracking-wider">
                    <i class="fas fa-list-check mr-2 md:mr-3"></i>任务列表
                </h2>
                <div class="text-sm text-gray-400 bg-black bg-opacity-20 rounded-lg px-3 py-1">
                    共 <span id="taskCount">0</span> 个任务
                </div>
            </div>

            <!-- 任务列表容器 -->
            <div id="taskList" class="space-y-4 min-h-96">
                <!-- 任务项将通过JavaScript动态生成 -->
                <div class="text-center text-gray-400 py-12">
                    <i class="fas fa-robot text-6xl mb-4 text-purple-400"></i>
                    <p class="text-xl">暂无任务</p>
                    <p class="text-sm mt-2">添加您的第一个任务开始管理</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 确认删除模态框 -->
    <div id="confirmModal" class="fixed inset-0 bg-black bg-opacity-50 backdrop-blur-sm flex items-center justify-center z-50 hidden p-4">
        <div class="glass rounded-xl p-6 md:p-8 max-w-md w-full neon-border-red">
            <h3 class="text-xl md:text-2xl font-bold text-red-400 mb-3 md:mb-4 text-center">确认删除</h3>
            <p class="text-gray-300 mb-4 md:mb-6 text-center text-sm md:text-base">确定要删除这个任务吗？此操作无法撤销。</p>
            <div class="flex flex-col md:flex-row gap-3 md:gap-4 justify-center">
                <button onclick="closeModal()"
                        class="px-4 md:px-6 py-2 md:py-3 bg-gray-600 hover:bg-gray-700 text-white rounded-lg transition-colors text-sm md:text-base">取消</button>
                <button onclick="confirmDelete()"
                        class="px-4 md:px-6 py-2 md:py-3 bg-red-600 hover:bg-red-700 text-white rounded-lg transition-colors text-sm md:text-base">确认删除</button>
            </div>
        </div>
    </div>

    <!-- 清空已完成任务模态框 -->
    <div id="clearModal" class="fixed inset-0 bg-black bg-opacity-50 backdrop-blur-sm flex items-center justify-center z-50 hidden p-4">
        <div class="glass rounded-xl p-6 md:p-8 max-w-md w-full neon-border-pink">
            <h3 class="text-xl md:text-2xl font-bold text-pink-400 mb-3 md:mb-4 text-center">清空已完成任务</h3>
            <p class="text-gray-300 mb-4 md:mb-6 text-center text-sm md:text-base">确定要删除所有已完成的任务吗？此操作无法撤销。</p>
            <div class="flex flex-col md:flex-row gap-3 md:gap-4 justify-center">
                <button onclick="closeClearModal()"
                        class="px-4 md:px-6 py-2 md:py-3 bg-gray-600 hover:bg-gray-700 text-white rounded-lg transition-colors text-sm md:text-base">取消</button>
                <button onclick="confirmClear()"
                        class="px-4 md:px-6 py-2 md:py-3 bg-pink-600 hover:bg-pink-700 text-white rounded-lg transition-colors text-sm md:text-base">确认清空</button>
            </div>
        </div>
    </div>

    <script>
        // 任务数据
        let tasks = [];
        let currentFilter = 'all';
        let searchTerm = '';
        let deleteTaskId = null;

        // 初始化应用
        document.addEventListener('DOMContentLoaded', function() {
            createParticles();
            loadTasks();
            updateStats();
            renderTasks();
            updateCountdowns();
            setInterval(updateCountdowns, 60000); // 每分钟更新倒计时
        });

        // 创建背景粒子
        function createParticles() {
            const particleContainer = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 15) + 's';
                particleContainer.appendChild(particle);
            }
        }

        // 任务构造函数
        function Task(id, title, description, dueDate, priority, category, completed = false) {
            this.id = id;
            this.title = title;
            this.description = description;
            this.dueDate = dueDate;
            this.priority = priority;
            this.category = category;
            this.completed = completed;
            this.createdAt = new Date().toISOString();
        }

        // 添加任务
        function addTask() {
            const title = document.getElementById('taskTitle').value.trim();
            const description = document.getElementById('taskDesc').value.trim();
            const dueDate = document.getElementById('taskDueDate').value;
            const priority = document.getElementById('taskPriority').value;
            const category = document.getElementById('taskCategory').value;

            if (!title) {
                alert('请输入任务标题');
                return;
            }

            const newTask = new Task(
                Date.now(),
                title,
                description,
                dueDate,
                priority,
                category,
                false
            );

            tasks.push(newTask);
            saveTasks();
            renderTasks();
            updateStats();

            // 清空输入框
            document.getElementById('taskTitle').value = '';
            document.getElementById('taskDesc').value = '';
            document.getElementById('taskDueDate').value = '';
        }

        // 切换任务完成状态
        function toggleTask(id) {
            const task = tasks.find(t => t.id == id);
            if (task) {
                task.completed = !task.completed;
                saveTasks();
                renderTasks();
                updateStats();

                // 添加完成动画
                const taskElement = document.querySelector(`[data-task-id="${id}"]`);
                if (taskElement && task.completed) {
                    taskElement.classList.add('task-complete', 'scan-complete');
                    setTimeout(() => {
                        taskElement.classList.remove('task-complete', 'scan-complete');
                    }, 800);

                    // 添加粒子效果
                    createCompletionParticles(taskElement);
                }
            }
        }

        // 创建完成粒子效果
        function createCompletionParticles(element) {
            const rect = element.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            for (let i = 0; i < 8; i++) {
                const particle = document.createElement('div');
                particle.style.cssText = `
                    position: fixed;
                    left: ${centerX}px;
                    top: ${centerY}px;
                    width: 6px;
                    height: 6px;
                    background: linear-gradient(45deg, #22c55e, #10b981);
                    border-radius: 50%;
                    pointer-events: none;
                    z-index: 1000;
                    animation: particle-burst 1s ease-out forwards;
                `;

                document.body.appendChild(particle);

                // 设置随机方向
                const angle = (i * 45) * Math.PI / 180;
                const distance = 50 + Math.random() * 30;
                const deltaX = Math.cos(angle) * distance;
                const deltaY = Math.sin(angle) * distance;

                particle.animate([
                    { transform: 'translate(0, 0) scale(1)', opacity: 1 },
                    { transform: `translate(${deltaX}px, ${deltaY}px) scale(0)`, opacity: 0 }
                ], {
                    duration: 1000,
                    easing: 'ease-out'
                });

                setTimeout(() => {
                    if (particle.parentNode) {
                        particle.parentNode.removeChild(particle);
                    }
                }, 1000);
            }
        }

        // 删除任务
        function deleteTask(id) {
            deleteTaskId = id;
            document.getElementById('confirmModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('confirmModal').classList.add('hidden');
            deleteTaskId = null;
        }

        function confirmDelete() {
            if (deleteTaskId) {
                tasks = tasks.filter(t => t.id != deleteTaskId);
                saveTasks();
                renderTasks();
                updateStats();
                closeModal();
            }
        }

        // 清空已完成任务
        function clearCompleted() {
            const completedCount = tasks.filter(t => t.completed).length;
            if (completedCount === 0) {
                alert('没有已完成的任务');
                return;
            }
            document.getElementById('clearModal').classList.remove('hidden');
        }

        function closeClearModal() {
            document.getElementById('clearModal').classList.add('hidden');
        }

        function confirmClear() {
            tasks = tasks.filter(t => !t.completed);
            saveTasks();
            renderTasks();
            updateStats();
            closeClearModal();
        }

        // 筛选任务
        function filterTasks(filter) {
            currentFilter = filter;

            // 更新按钮状态
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active', 'bg-purple-600', 'bg-pink-600', 'bg-cyan-600', 'bg-red-600');
                btn.classList.add('bg-gray-600');
            });

            const activeBtn = document.querySelector(`[onclick="filterTasks('${filter}')"]`);
            if (activeBtn) {
                activeBtn.classList.remove('bg-gray-600');
                activeBtn.classList.add('active');
                if (filter === 'all') activeBtn.classList.add('bg-purple-600');
                else if (filter === 'pending') activeBtn.classList.add('bg-pink-600');
                else if (filter === 'completed') activeBtn.classList.add('bg-cyan-600');
                else if (filter === 'high' || filter === 'overdue') activeBtn.classList.add('bg-red-600');
            }

            renderTasks();
        }

        // 搜索任务
        document.getElementById('searchInput').addEventListener('input', function() {
            searchTerm = this.value.toLowerCase();
            renderTasks();
        });

        // 渲染任务列表
        function renderTasks() {
            const taskList = document.getElementById('taskList');
            let filteredTasks = tasks;

            // 应用筛选
            switch (currentFilter) {
                case 'pending':
                    filteredTasks = tasks.filter(t => !t.completed);
                    break;
                case 'completed':
                    filteredTasks = tasks.filter(t => t.completed);
                    break;
                case 'high':
                    filteredTasks = tasks.filter(t => t.priority === 'high');
                    break;
                case 'overdue':
                    filteredTasks = tasks.filter(t => isOverdue(t));
                    break;
            }

            // 应用搜索
            if (searchTerm) {
                filteredTasks = filteredTasks.filter(t =>
                    t.title.toLowerCase().includes(searchTerm) ||
                    t.description.toLowerCase().includes(searchTerm)
                );
            }

            // 渲染任务
            if (filteredTasks.length === 0) {
                taskList.innerHTML = `
                    <div class="text-center text-gray-400 py-12">
                        <i class="fas fa-robot text-6xl mb-4 text-purple-400"></i>
                        <p class="text-xl">${searchTerm ? '未找到匹配的任务' : '暂无任务'}</p>
                        <p class="text-sm mt-2">${searchTerm ? '尝试其他搜索词' : '添加您的第一个任务开始管理'}</p>
                    </div>
                `;
            } else {
                taskList.innerHTML = filteredTasks.map(task => createTaskHTML(task)).join('');
            }

            // 更新任务计数
            document.getElementById('taskCount').textContent = filteredTasks.length;

            // 初始化拖拽排序
            initDragAndDrop();
        }

        // 创建任务HTML
        function createTaskHTML(task) {
            const isOverdueTask = isOverdue(task);
            const countdown = getCountdown(task.dueDate);

            return `
                <div class="glass glass-hover rounded-lg p-4 md:p-6 ${task.priority === 'high' ? 'priority-high' : task.priority === 'medium' ? 'priority-medium' : 'priority-low'} ${task.completed ? 'opacity-60' : ''} slide-in" data-task-id="${task.id}">
                    <div class="flex items-start justify-between">
                        <div class="flex items-start space-x-3 md:space-x-4 flex-1">
                            <button onclick="toggleTask(${task.id})"
                                    class="w-6 h-6 md:w-8 md:h-8 rounded-full border-2 ${task.completed ? 'bg-green-500 border-green-500' : 'border-gray-400'} flex items-center justify-center transition-all duration-300 hover:scale-110 mt-0.5 md:mt-1 flex-shrink-0">
                                ${task.completed ? '<i class="fas fa-check text-white text-xs md:text-sm"></i>' : ''}
                            </button>

                            <div class="flex-1 min-w-0">
                                <h3 class="text-lg md:text-xl font-bold ${task.completed ? 'line-through text-gray-400' : 'text-white'} mb-2 md:mb-3 break-words">
                                    ${task.title}
                                </h3>
                                ${task.description ? `<p class="text-gray-300 text-sm md:text-base mb-3 md:mb-4 leading-relaxed break-words">${task.description}</p>` : ''}

                                <div class="grid grid-cols-1 gap-3 md:gap-4">
                                    <!-- 分类和优先级 -->
                                    <div class="space-y-2">
                                        <div class="text-xs text-gray-400 uppercase tracking-wider mb-1">分类 & 优先级</div>
                                        <div class="flex flex-wrap gap-2">
                                            <span class="category-${task.category} px-3 py-1 md:px-4 md:py-2 rounded-lg text-white text-xs md:text-sm font-medium uppercase tracking-wider inline-flex items-center">
                                                <i class="fas ${getCategoryIcon(task.category)} mr-1 md:mr-2"></i>${getCategoryName(task.category)}
                                            </span>
                                            <span class="priority-${task.priority} px-3 py-1 md:px-4 md:py-2 rounded-lg text-white text-xs md:text-sm font-medium uppercase tracking-wider inline-flex items-center">
                                                <i class="fas ${getPriorityIcon(task.priority)} mr-1 md:mr-2"></i>${getPriorityName(task.priority)}
                                            </span>
                                        </div>
                                    </div>

                                    <!-- 时间信息 -->
                                    <div class="space-y-2">
                                        <div class="text-xs text-gray-400 uppercase tracking-wider mb-1">时间信息</div>

                                        <!-- 创建时间 -->
                                        <div class="flex items-center text-gray-300 text-xs md:text-sm bg-black bg-opacity-20 rounded-lg p-2 md:p-3">
                                            <i class="fas fa-plus-circle mr-2 md:mr-3 text-green-400 text-sm md:text-lg flex-shrink-0"></i>
                                            <div class="flex-1 min-w-0">
                                                <div class="text-xs text-gray-400 mb-0.5">创建时间</div>
                                                <div class="font-medium truncate">${formatDateTime(task.createdAt)}</div>
                                            </div>
                                        </div>

                                        <!-- 截止时间 -->
                                        ${task.dueDate ? `
                                            <div class="flex items-center text-xs md:text-sm bg-black bg-opacity-20 rounded-lg p-2 md:p-3">
                                                <i class="fas fa-hourglass-end mr-2 md:mr-3 ${isOverdueTask ? 'text-red-400' : 'text-cyan-400'} text-sm md:text-lg flex-shrink-0"></i>
                                                <div class="flex-1 min-w-0">
                                                    <div class="text-xs text-gray-400 mb-0.5">截止时间</div>
                                                    <div class="font-medium ${isOverdueTask ? 'text-red-400' : 'text-cyan-400'} truncate">${formatDateTime(task.dueDate)}</div>
                                                </div>
                                            </div>

                                            <!-- 倒计时 -->
                                            <div class="flex items-center text-xs md:text-sm bg-black bg-opacity-20 rounded-lg p-2 md:p-3">
                                                <i class="fas fa-stopwatch mr-2 md:mr-3 ${getCountdownIconStyle(task.dueDate, isOverdueTask)} text-sm md:text-lg flex-shrink-0"></i>
                                                <div class="flex-1 min-w-0">
                                                    <div class="text-xs text-gray-400 mb-0.5">剩余时间</div>
                                                    <div class="font-mono font-bold ${getCountdownTextStyle(task.dueDate, isOverdueTask)} countdown-display truncate">
                                                        ${countdown}
                                                    </div>
                                                </div>
                                            </div>
                                        ` : '<div class="text-gray-500 text-xs md:text-sm bg-black bg-opacity-20 rounded-lg p-2 md:p-3 text-center">无截止日期</div>'}
                                    </div>

                                    <!-- 状态指示器 -->
                                    <div class="space-y-2">
                                        <div class="text-xs text-gray-400 uppercase tracking-wider mb-1">状态</div>
                                        <div class="flex flex-wrap gap-2">
                                            ${task.completed ? `
                                                <div class="flex items-center text-green-400 text-xs md:text-sm bg-green-500 bg-opacity-10 rounded-lg px-3 py-1 md:px-4 md:py-2 border border-green-500 border-opacity-30">
                                                    <i class="fas fa-check-circle mr-1 md:mr-2"></i>
                                                    <span class="font-medium">已完成</span>
                                                </div>
                                            ` : `
                                                <div class="flex items-center text-yellow-400 text-xs md:text-sm bg-yellow-500 bg-opacity-10 rounded-lg px-3 py-1 md:px-4 md:py-2 border border-yellow-500 border-opacity-30">
                                                    <i class="fas fa-clock mr-1 md:mr-2"></i>
                                                    <span class="font-medium">进行中</span>
                                                </div>
                                            `}

                                            ${isOverdueTask && !task.completed ? `
                                                <div class="flex items-center text-red-400 text-xs md:text-sm bg-red-500 bg-opacity-10 rounded-lg px-3 py-1 md:px-4 md:py-2 border border-red-500 border-opacity-30 pulse-urgent">
                                                    <i class="fas fa-exclamation-triangle mr-1 md:mr-2 animate-pulse"></i>
                                                    <span class="font-medium">已逾期</span>
                                                </div>
                                            ` : ''}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="flex items-center space-x-1 md:space-x-2 ml-2 md:ml-4 flex-shrink-0">
                            <button onclick="deleteTask(${task.id})"
                                    class="text-red-400 hover:text-red-300 transition-colors p-2 md:p-3 hover:bg-red-500 hover:bg-opacity-20 rounded-lg">
                                <i class="fas fa-trash-alt text-sm md:text-base"></i>
                            </button>
                        </div>
                    </div>

                    ${task.completed ? '<div class="scan-line mt-3 md:mt-4"></div>' : ''}
                </div>
            `;
        }

        // 获取分类名称
        function getCategoryName(category) {
            const names = {
                work: '工作',
                study: '学习',
                life: '生活',
                personal: '个人',
                other: '其他'
            };
            return names[category] || category;
        }

        // 获取分类图标
        function getCategoryIcon(category) {
            const icons = {
                work: 'fa-briefcase',
                study: 'fa-graduation-cap',
                life: 'fa-home',
                personal: 'fa-user',
                other: 'fa-folder'
            };
            return icons[category] || 'fa-folder';
        }

        // 获取优先级名称
        function getPriorityName(priority) {
            const names = {
                high: '高优先级',
                medium: '中优先级',
                low: '低优先级'
            };
            return names[priority] || priority;
        }

        // 获取优先级图标
        function getPriorityIcon(priority) {
            const icons = {
                high: 'fa-arrow-up',
                medium: 'fa-minus',
                low: 'fa-arrow-down'
            };
            return icons[priority] || 'fa-minus';
        }

        // 判断是否逾期
        function isOverdue(task) {
            if (!task.dueDate || task.completed) return false;
            return new Date(task.dueDate) < new Date();
        }

        // 格式化日期时间
        function formatDateTime(dateTime) {
            const date = new Date(dateTime);
            const now = new Date();
            const diff = now - date;

            // 如果是今天，显示时间
            if (date.toDateString() === now.toDateString()) {
                return `今天 ${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
            }

            // 如果是昨天
            const yesterday = new Date(now);
            yesterday.setDate(yesterday.getDate() - 1);
            if (date.toDateString() === yesterday.toDateString()) {
                return `昨天 ${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
            }

            // 其他日期
            return `${date.getMonth() + 1}/${date.getDate()} ${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
        }

        // 获取精确倒计时（到分钟）
        function getCountdown(dueDate) {
            if (!dueDate) return '';

            const now = new Date();
            const due = new Date(dueDate);
            const diff = due - now;

            if (diff < 0) {
                const overdue = Math.abs(diff);
                const days = Math.floor(overdue / (1000 * 60 * 60 * 24));
                const hours = Math.floor((overdue % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((overdue % (1000 * 60 * 60)) / (1000 * 60));

                if (days > 0) {
                    return `已逾期 ${days}天 ${hours}小时 ${minutes}分钟`;
                } else if (hours > 0) {
                    return `已逾期 ${hours}小时 ${minutes}分钟`;
                } else {
                    return `已逾期 ${minutes}分钟`;
                }
            } else {
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));

                if (days > 0) {
                    return `还剩 ${days}天 ${hours}小时 ${minutes}分钟`;
                } else if (hours > 0) {
                    return `还剩 ${hours}小时 ${minutes}分钟`;
                } else if (minutes > 0) {
                    return `还剩 ${minutes}分钟`;
                } else {
                    return `即将到期`;
                }
            }
        }

        // 获取倒计时图标样式
        function getCountdownIconStyle(dueDate, isOverdue) {
            if (isOverdue) {
                return 'text-red-400 animate-pulse';
            }

            const now = new Date();
            const due = new Date(dueDate);
            const diff = due - now;
            const hours = Math.floor(diff / (1000 * 60 * 60));

            if (hours <= 1) {
                return 'text-red-400 animate-pulse';
            } else if (hours <= 24) {
                return 'text-yellow-400';
            } else {
                return 'text-cyan-400';
            }
        }

        // 获取倒计时文本样式
        function getCountdownTextStyle(dueDate, isOverdue) {
            if (isOverdue) {
                return 'text-red-400 pulse-urgent font-bold';
            }

            const now = new Date();
            const due = new Date(dueDate);
            const diff = due - now;
            const hours = Math.floor(diff / (1000 * 60 * 60));

            if (hours <= 1) {
                return 'text-red-400 pulse-neon font-bold';
            } else if (hours <= 24) {
                return 'text-yellow-400 font-semibold';
            } else {
                return 'text-cyan-400';
            }
        }

        // 更新倒计时显示
        function updateCountdowns() {
            const countdownElements = document.querySelectorAll('.countdown-display');
            countdownElements.forEach(el => {
                const taskElement = el.closest('[data-task-id]');
                if (taskElement) {
                    const taskId = parseInt(taskElement.getAttribute('data-task-id'));
                    const task = tasks.find(t => t.id === taskId);
                    if (task && task.dueDate) {
                        const countdown = getCountdown(task.dueDate);
                        const isOverdue = isOverdue(task);

                        el.textContent = countdown;
                        el.className = `${getCountdownTextStyle(task.dueDate, isOverdue)} countdown-display`;

                        // 更新图标
                        const icon = el.parentElement.querySelector('i');
                        if (icon) {
                            icon.className = `fas fa-stopwatch mr-2 ${getCountdownIconStyle(task.dueDate, isOverdue)}`;
                        }
                    }
                }
            });
        }

        // 初始化拖拽排序
        function initDragAndDrop() {
            const taskList = document.getElementById('taskList');
            if (taskList.children.length > 1) {
                new Sortable(taskList, {
                    animation: 150,
                    handle: '.glass',
                    onEnd: function() {
                        // 重新排序tasks数组
                        const taskElements = taskList.children;
                        const newTasks = [];
                        for (let i = 0; i < taskElements.length; i++) {
                            const taskId = parseInt(taskElements[i].getAttribute('data-task-id'));
                            const task = tasks.find(t => t.id === taskId);
                            if (task) newTasks.push(task);
                        }
                        tasks = newTasks;
                        saveTasks();
                    }
                });
            }
        }

        // 更新统计数据
        function updateStats() {
            const total = tasks.length;
            const completed = tasks.filter(t => t.completed).length;
            const pending = total - completed;
            const overdue = tasks.filter(t => isOverdue(t)).length;

            document.getElementById('totalTasks').textContent = total;
            document.getElementById('completedTasks').textContent = completed;
            document.getElementById('pendingTasks').textContent = pending;
            document.getElementById('overdueTasks').textContent = overdue;
        }

        // 保存任务到localStorage
        function saveTasks() {
            localStorage.setItem('nexusTasks', JSON.stringify(tasks));
        }

        // 从localStorage加载任务
        function loadTasks() {
            const saved = localStorage.getItem('nexusTasks');
            if (saved) {
                tasks = JSON.parse(saved);
            }
        }
    </script>

    <!-- 使用说明 -->
    <div class="fixed bottom-2 right-2 md:bottom-4 md:right-4">
        <div class="glass rounded-lg p-3 md:p-4 max-w-xs md:max-w-sm neon-border-purple">
            <h3 class="text-base md:text-lg font-bold text-purple-400 mb-1 md:mb-2">使用说明</h3>
            <ul class="text-xs md:text-sm text-gray-300 space-y-1">
                <li>• 添加任务：填写标题、描述、截止日期</li>
                <li>• 设置优先级和分类</li>
                <li>• 点击复选框完成任务</li>
                <li>• 拖拽任务进行排序</li>
                <li>• 使用筛选和搜索功能</li>
                <li>• 数据自动保存到本地</li>
            </ul>
            <div class="mt-2 md:mt-3 text-xs text-cyan-400">
                支持响应式设计，适配移动端
            </div>
        </div>
    </div>
</body>
</html>
